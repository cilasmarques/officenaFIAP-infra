apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: officenafiap-ingress
  annotations:
    cert-manager.io/cluster-issuer: letsencrypt-prod
    kubernetes.io/ingress.class: nginx
spec:
  ingressClassName: nginx
  tls:
    - hosts:
        - officenafiap.clsmfm.space
      secretName: officenafiap-tls
  rules:
    - host: officenafiap.clsmfm.space
      http:
        paths:
          - path: /v1/payments/webhooks
            pathType: Prefix
            backend:
              service:
                name: billing-service
                port:
                  number: 5003
          - path: /
            pathType: Prefix
            backend:
              service:
                name: user-service
                port:
                  number: 5001
